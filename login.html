<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập Thành Viên</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-box {
            max-width: 400px;
            margin: 50px auto;
            background: #fff;
            padding: 30px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ccc; }
        .btn-submit { background: #111; color: #fff; padding: 10px; width: 100%; border: none; cursor: pointer; }
        .btn-submit:hover { background: #ff4757; }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Trang Chủ</a></li>
            <li><a href="news.html">Tin Tức</a></li>
            <li><a href="events.html">Sự Kiện</a></li>
            <li><a href="login.html">Đăng Nhập</a></li>
        </ul>
    </nav>

    <div class="login-box">
        <h2>Đăng Nhập Thành Viên</h2>
        <br>
        <form id="loginForm">
            <div class="form-group">
                <label>Tên đăng nhập / Email:</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu:</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-submit">Đăng Nhập</button>
        </form>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
